# Post-migration container publish workflow — CodeArtifact dependency auth (canonical for journey repos).
# Copy to .github/workflows/docker-push.yml when creating a new consumer repo.
#
# Prerequisites (org-level):
#   secrets.AWS_ROLE_ARN_READ
#   vars.AWS_REGION, vars.AWS_SHARED_SERVICES_ACCOUNT_ID
#   vars.CODEARTIFACT_DOMAIN, vars.CODEARTIFACT_PYPI_REPO or CODEARTIFACT_NPM_REPO
#
# See mentorhub_cloudformation docs/specifications/DEPENDENCY_MOVE.md (Reference implementation appendix).
# Pre-migration (git deps): docker-push.yml in this directory.

name: Build and Push Docker Image
run-name: ${{ github.actor }} ran Build and Push

on:
  push:
    branches:
      - main

jobs:
  build_push_api:
    # Use this job block for mentorhub_*_api repos.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_READ }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Build pip index URL with CodeArtifact token
        id: ca_pip
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain ${{ vars.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ vars.AWS_SHARED_SERVICES_ACCOUNT_ID }} \
            --query authorizationToken --output text)
          END=$(aws codeartifact get-repository-endpoint \
            --domain ${{ vars.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ vars.AWS_SHARED_SERVICES_ACCOUNT_ID }} \
            --repository ${{ vars.CODEARTIFACT_PYPI_REPO }} \
            --format pypi \
            --query repositoryEndpoint --output text)
          HOST="${END#https://}"
          echo "pip_index_url=https://aws:${TOKEN}@${HOST}simple/" >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/mentor-forge/REPLACE_ME_API:latest
          build-args: |
            PIP_INDEX_URL=${{ steps.ca_pip.outputs.pip_index_url }}

  build_push_spa:
    # Use this job block for mentorhub_*_spa repos (delete build_push_api job).
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_READ }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Get CodeArtifact npm token
        id: ca_npm
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain ${{ vars.CODEARTIFACT_DOMAIN }} \
            --domain-owner ${{ vars.AWS_SHARED_SERVICES_ACCOUNT_ID }} \
            --query authorizationToken --output text)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/mentor-forge/REPLACE_ME_SPA:latest
          secrets: |
            codeartifact_token=${{ steps.ca_npm.outputs.token }}
