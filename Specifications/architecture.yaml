architecture:
  organization: Agile Learning Institute
  product: Mentor Hub
  cloud-accounts:
    - name: Agile-Learning (Mike Storey)
      description: The Mike Storey account (to be renamed) is the primary account for the Agile Learning Institute. 
    - name: Shared-Services
      description: The Shared-Services account is the account for the Shared-Services used by our dev team or multiple AWS accounts.
      budget: $100/month
      services:
        - CloudTrail
        - CodeArtifact
        - ElasticContainerRegistry
    - name: mentorhub-dev
      description: The mentorhub-dev account is the account for the Mentor Hub development, test, or short-lived environments.
      budget: $100/month
      services:
        - CloudTrail
        - vpc: mentorhub-dev-vpc
          cidr: 10.0.0.0/16
          subnets:
            - name: mentorhub-dev-subnet-public1-us-east-2a
              cidr: 10.0.0.0/20
            - name: mentorhub-dev-subnet-private1-us-east-2a
              cidr: 10.0.128.0/20
            - name: mentorhub-dev-subnet-public2-us-east-2b
              cidr: 10.0.16.0/20
            - name: mentorhub-dev-subnet-private2-us-east-2b
              cidr: 10.0.144.0/20
        - ecs: mentorhub-dev-ecs
          description: The mentorhub-dev-ecs is the ECS cluster for the Mentor Hub development, test, or short-lived environments.
          environments
            - name: dev
              description: The development environment 
              tag: latest
              database_name: mentorhub-dev
            - name: test
              description: The test environment is used to test the Mentor Hub system.
              tag: test
              database_name: mentorhub-test
        - DocumentDB: mentorhub-dev-documentdb
    - name: mentorhub-staging
      description: The mentorhub-staging account is the account for the Mentor Hub staging environment, a mirror of production that can be shut down between releases.
      budget: $100/month
      services:
        - CloudTrail
        - vpc: mentorhub-staging-vpc
          cidr: TBD
          subnets:
            - name: mentorhub-staging-subnet-public1-us-east-2a
              cidr: TBD
            - name: mentorhub-staging-subnet-private1-us-east-2a
              cidr: TBD
            - name: mentorhub-staging-subnet-public2-us-east-2b
              cidr: TBD
            - name: mentorhub-staging-subnet-private2-us-east-2b
              cidr: TBD
        - ecs: mentorhub-staging-ecs
          description: The mentorhub-staging-ecs is the ECS cluster for the Mentor Hub staging environment.
          environments
            - name: staging
              description: A mirror of production that can be shut down between releases.
              tag: staging
              database_name: mentorhub-staging
        - DocumentDB: mentorhub-staging-documentdb
    - name: mentorhub-production
      description: The mentorhub-production account is the account for the LIVE Mentor Hub production environment.
      budget: $100/month
      services:
        - CloudTrail
        - vpc: mentorhub-production-vpc
          cidr: TBD
          subnets:
            - name: mentorhub-production-subnet-public1-us-east-2a
              cidr: TBD
            - name: mentorhub-production-subnet-private1-us-east-2a
              cidr: TBD
            - name: mentorhub-production-subnet-public2-us-east-2b
              cidr: TBD
            - name: mentorhub-production-subnet-private2-us-east-2b
              cidr: TBD
        - ecs: mentorhub-production-ecs
          description: The mentorhub-production-ecs is the ECS cluster for the Mentor Hub production environment.
          environments
            - name: production
              description: A mirror of production that can be shut down between releases.
              tag: production
              database_name: mentorhub-production
        - DocumentDB: mentorhub-production-documentdb
  journey-domains:
    - name: schema
      description: MongoDB Database Configuration and Management.
      repos:
        - name: mongodb_api
          description: MongoDB Configurator API Server
          template: agile-learning-institute/stage0_template_configurator_api
          publish: make
          type: api
          port: 8383
        - name: configurator_spa
          description: MongoDB Configurator SPA (utility container, not a real repository)
          type: spa_ref
          port: 8384
    - name: common_code
      description: Shared code used across multiple API or SPA code bases are published to private dependency management libraries (NPM /PYPI).
      repos:
        - name: api_utils
          description: Python PyPI API Utility Library
          template: agile-learning-institute/stage0_template_py_utils
          publish: pipenv
          type: api
          port: 8385
        - name: spa_utils
          description: Vue NPM SPA Utility Library
          template: agile-learning-institute/stage0_template_vue_utils
          publish: npm
          type: spa
          port: 8386
    - name: customer
      description: The Customer User Journey is responsible for managing customers and their interactions with the system.
      is_journey: true
      data_domains:
        controls:
          - Subscription
          - Dashboard
          - Card
        creates:
          - Event
        consumes: 
          - Profile
          - Customer
          - Journey
          - Rating
          - Note
      repos:
        - name: customer_api
          description: Customer API
          template: agile-learning-institute/stage0_template_flask_mongo
          publish: pipenv
          type: api
          port: 8387
        - name: customer_spa
          description: Customer SPA
          template: agile-learning-institute/stage0_template_vue_vuetify
          publish: npm
          type: spa
          port: 8388
    - name: coordinator
      description: The Coordinator User Journey is responsible for matching mentors with craftsperson.
      is_journey: true
      data_domains:
        controls:
          - Customer 
          - Identity
          - Profile
          - Login
        creates:
          - Event
        consumes: []
      repos:
        - name: coordinator_api
          description: Coordinator API
          template: agile-learning-institute/stage0_template_flask_mongo
          publish: pipenv
          type: api
          port: 8389
        - name: coordinator_spa
          description: Coordinator SPA
          template: agile-learning-institute/stage0_template_vue_vuetify
          publish: npm
          type: spa
          port: 8390
    - name: mentor
      description: Mentor User Journey Domain
      is_journey: true
      data_domains:
        controls:
          - Resource
          - Path
          - Plan
          - Encounter
        creates:
          - Event
        consumes:
          - Profile
      repos:
        - name: mentor_api
          description: Mentor API
          template: agile-learning-institute/stage0_template_flask_mongo
          publish: pipenv
          type: api
          port: 8391
        - name: mentor_spa
          description: Mentor SPA
          template: agile-learning-institute/stage0_template_vue_vuetify
          publish: npm
          type: spa
          port: 8392
    - name: mentee
      description: Mentee User Journey Domain
      is_journey: true
      data_domains:
        controls:
          - Journey
          - Rating
          - Note
        creates:
          - Event
        consumes:
          - Resource
          - Path 
      repos:
        - name: mentee_api
          description: Mentee API
          template: agile-learning-institute/stage0_template_flask_mongo
          publish: pipenv
          type: api
          port: 8393 
        - name: mentee_spa
          description: Mentee SPA
          template: agile-learning-institute/stage0_template_vue_vuetify
          publish: npm
          type: spa
          port: 8394                  
    - name: runbook
      description: Runbook Automation
      repos:
        - name: runbook_api
          description: Runbook Automation API Server
          template: agile-learning-institute/stage0_template_runbook_api
          publish: make
          type: api
          port: 8395
        - name: runbook_spa
          description: Runbook Automation SPA (utility container, not a real repository)
          type: spa_ref
          port: 8396
