$schema: "https://github.com/agile-learning-institute/stage0/blob/main/Schemas/process.schema.yaml"
$id: "https://github.com/agile-learning-institute/stage0_template_umbrella/blob/main/.stage0_template/process.yaml"
title: Process file for a Umbrella Template

environment:

context:
  - key: info
    type: path
    path: specifications.product.info
  - key: org
    type: path
    path: specifications.product.organization
  - key: architecture
    type: path
    path: specifications.architecture.architecture

requires:
  - info.name
  - info.description
  - info.slug
  - org.name
  - org.founded
  - org.git_host
  - org.git_org
  - org.docker_host
  - org.docker_org
  - architecture.domains

templates:
  - path: "./DeveloperEdition/docker-compose.yaml"
    merge: true
  - path: "./DeveloperEdition/standards/api_standards.md"
    merge: true
  - path: "./DeveloperEdition/standards/sre_standards.md"
    merge: true
  - path: "./DeveloperEdition/standards/system_tour.md"
    merge: true
  - path: "./DeveloperEdition/de.template"
    output: "./DeveloperEdition/{{info.developer_cli}}"
    merge: true
  - path: "./index.html"
    merge: true
  - path: "./Tasks/AS_NEEDED.R100.after_specs_update.md"
    merge: true
  - path: "./Tasks/AS_NEEDED.R101.welcome_personas_from_architecture.md"
    merge: true
  - path: "./Dockerfile"
    merge: true
  - path: "./LICENSE"
    merge: true
  - path: "./CONTRIBUTING.md"
    merge: true
  - path: "./README.md.template"
    output: "./README.md"
    merge: true
  - path: "./Makefile.template"
    output: "./Makefile"
    merge: true
  - path: "./.github/workflows/docker-push.yml.template"
    output: "./.github/workflows/docker-push.yml"
    merge: true

  